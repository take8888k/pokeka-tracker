name: ポケカ投稿を毎日取得

on:
  schedule:
    # 毎日 日本時間 朝8時 (UTC 23:00) に実行
    - cron: '0 23 * * *'
  workflow_dispatch:  # 手動実行も可能（テスト用）

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ツイートを取得
        run: python scripts/fetch.py

      - name: 変更をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tweets.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "データ更新: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
